name: Label explorer reports

# When an explorer-report issue is filed, read the ticked "Error type(s)" and apply the matching labels,
# so curators can filter (e.g. label:explorer-report label:geocoding) and a coding agent can pull a clean,
# typed, structured set of reports to look for systemic fixes.

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue.labels.some(l => l.name === "explorer-report")) return;  // only reports from the explorer
            const body = (issue.body || "").toLowerCase();
            const map = { "ocr": "ocr", "tables": "tables", "geocoding": "geocoding", "aat typing": "aat-typing",
                          "over-split": "over-split", "under-split": "under-split", "merged": "merged", "other": "other" };
            const have = issue.labels.map(l => l.name);
            const add = Object.entries(map)
              .filter(([text, lab]) => body.includes(`[x] ${text}`) && !have.includes(lab))
              .map(([, lab]) => lab);
            if (add.length) await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels: add });
