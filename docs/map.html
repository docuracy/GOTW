<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Gazetteer of the World — extracted places</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>
  <style>
    :root { --ink:#1a2438; --paper:#f4f1ea; --line:#d8d2c4; }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; font-family:Georgia,"Times New Roman",serif; color:var(--ink); }
    header { padding:.7rem 1.1rem; background:var(--paper); border-bottom:1px solid var(--line);
             display:flex; align-items:baseline; gap:.9rem; flex-wrap:wrap; }
    header h1 { font-size:1.05rem; margin:0; }
    header .sub { font-size:.8rem; color:#6b6452; font-style:italic; }
    header a { color:#2a6f97; font-size:.8rem; margin-left:auto; }
    #map { position:absolute; top:0; left:0; right:0; bottom:0; }
    .wrap { position:absolute; top:48px; left:0; right:0; bottom:0; }
    .legend { position:absolute; bottom:18px; left:12px; background:rgba(244,241,234,.94);
              border:1px solid var(--line); border-radius:6px; padding:.5rem .7rem; font-size:.74rem;
              font-family:system-ui,sans-serif; line-height:1.7; box-shadow:0 1px 6px rgba(0,0,0,.12); }
    .legend b { display:block; font-size:.7rem; letter-spacing:.04em; text-transform:uppercase;
                color:#6b6452; margin-bottom:.2rem; }
    .dot { display:inline-block; width:11px; height:11px; border-radius:50%; margin-right:.4rem;
           vertical-align:-1px; border:1px solid rgba(0,0,0,.25); }
    .maplibregl-popup-content { font-family:Georgia,serif; padding:.8rem .9rem; max-width:300px; border-radius:6px; }
    .pop h3 { margin:0 0 .15rem; font-size:1.05rem; }
    .pop .meta { font-size:.82rem; color:#5a5446; margin:0 0 .5rem; }
    .pop dl { margin:.4rem 0 0; font-size:.82rem; }
    .pop dt { font-weight:bold; color:#6b6452; font-size:.7rem; text-transform:uppercase; letter-spacing:.03em; margin-top:.45rem; }
    .pop dd { margin:.05rem 0 0; }
    .pop ul { margin:.1rem 0 0; padding-left:1.1rem; }
    .pop .src { margin-top:.6rem; font-size:.74rem; color:#857d6c; font-style:italic; border-top:1px solid var(--line); padding-top:.4rem; }
    .pop a { color:#2a6f97; }
    .maplibregl-popup.tip .maplibregl-popup-content { padding:.18rem .45rem; font-size:.82rem;
      font-family:Georgia,serif; box-shadow:0 1px 5px rgba(0,0,0,.22); }
    .maplibregl-popup.tip .maplibregl-popup-tip { display:none; }
    .tip-name { font-weight:bold; color:var(--ink); }
    /* popup actions */
    .pop-actions { margin-top:.6rem; display:flex; gap:.7rem; align-items:center; flex-wrap:wrap; }
    .read-btn { font-family:Georgia,serif; font-size:.8rem; cursor:pointer; background:#2a6f97; color:#fff;
                border:none; border-radius:4px; padding:.3rem .6rem; }
    .read-btn:hover { background:#225b7c; }
    .src-link { font-size:.78rem; color:#2a6f97; }
    /* full-entry reader modal */
    .modal { position:fixed; inset:0; background:rgba(26,36,56,.55); display:flex; align-items:center;
             justify-content:center; z-index:1000; }
    .modal[hidden] { display:none; }
    .modal-box { width:min(880px,94vw); height:88vh; background:var(--paper); border:1px solid var(--line);
                 border-radius:8px; box-shadow:0 8px 40px rgba(0,0,0,.4); display:flex; flex-direction:column; overflow:hidden; }
    .modal-head { display:flex; align-items:center; gap:1rem; padding:.6rem 1rem; border-bottom:1px solid var(--line); background:#efeadf; }
    .modal-head span { font-size:1rem; font-weight:bold; }
    #reader-close { margin-left:auto; border:none; background:none; font-size:1.3rem; cursor:pointer; color:#6b6452; line-height:1; }
    .reader { overflow-y:auto; padding:1rem 1.4rem; flex:1; }
    .rvol { text-align:center; font-weight:bold; font-size:1rem; color:#6b6452; background:#efeadf;
            border-top:2px solid #c26b4a; border-bottom:1px solid var(--line); padding:.7rem; margin:.6rem -1.4rem 1rem; }
    .rentry { padding:.45rem .7rem; margin:.2rem 0; border-left:3px solid transparent; scroll-margin-top:1rem; }
    .rentry.hi { background:#fbf6e7; border-left-color:#c26b4a; }
    .rhw { margin:0 0 .25rem; font-size:.95rem; letter-spacing:.02em; }
    .rhw .rp { font-weight:normal; font-size:.72rem; color:#857d6c; font-style:italic; margin-left:.4rem; }
    .rtext { font-size:.9rem; line-height:1.5; color:#2a2f3a; white-space:pre-wrap; }
    .rtext.rxref { color:#6b6452; font-style:italic; }
    .rtable { border-collapse:collapse; margin:.6rem 0; font-size:.8rem; font-family:system-ui,sans-serif; }
    .rtable caption { text-align:left; font-style:italic; color:#6b6452; padding:.2rem 0; }
    .rtable th, .rtable td { border:1px solid var(--line); padding:.15rem .4rem; text-align:right; }
    .rtable th { background:#efeadf; text-align:center; }
    .rtable th.blank { background:transparent; border:none; }
    .rtable .unit { font-weight:normal; color:#857d6c; }
    .rnote { font-size:.72rem; color:#857d6c; font-style:italic; margin-top:.1rem; }
    #sentinel-top, #sentinel-bottom { height:1px; }
  </style>
</head>
<body>
  <header>
    <h1>A Gazetteer of the World — extracted places</h1>
    <span class="sub">LLM-extracted (self-hosted Llama-3.3-70B) · geolocated against the World Historical Gazetteer (3-pass reconciliation)</span>
    <a href="./">← about this project</a>
  </header>
  <div class="wrap"><div id="map"></div>
    <div class="legend" id="legend"><b>Feature type</b></div>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal-box">
      <div class="modal-head"><span id="reader-title"></span><button id="reader-close" title="Close (Esc)">✕</button></div>
      <div class="reader" id="reader-scroll">
        <div id="sentinel-top"></div>
        <div id="reader-content"></div>
        <div id="sentinel-bottom"></div>
      </div>
    </div>
  </div>

  <script>
  const COLORS = { P:"#c26b4a", A:"#4a6fa5", H:"#2e8b8b", T:"#8a6d3b", S:"#7a4a6b", X:"#777" };
  const LABELS = { P:"Populated place", A:"Administrative", H:"Water body", T:"Landform", S:"Structure", X:"People" };

  // Light editorial basemap (CARTO Positron raster + OSM data).
  const style = {
    version: 8,
    sources: { carto: {
      type: "raster", tileSize: 256,
      tiles: ["https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",
              "https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png"],
      attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
    }},
    layers: [{ id: "carto", type: "raster", source: "carto" }]
  };
  const map = new maplibregl.Map({ container: "map", style, center: [10, 35], zoom: 1.6 });
  map.addControl(new maplibregl.NavigationControl(), "top-right");

  function whgLink(id) {
    if (!id) return "";
    const m = id.match(/^place:(?:(wd|gn|tgn):)?(.+)$/);
    if (!m) return id;
    const [, ns, ref] = m;
    const url = ns === "wd" ? `https://www.wikidata.org/wiki/${ref}`
              : ns === "gn" ? `https://www.geonames.org/${ref}`
              : ns === "tgn" ? `https://vocab.getty.edu/tgn/${ref}`
              : /^\d+$/.test(ref) ? `https://whgazetteer.org/places/${ref}/portal` : null;
    return url ? `<a href="${url}" target="_blank" rel="noopener">${id}</a>` : id;
  }
  const esc = s => (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

  function popupHTML(p) {
    // MapLibre serialises array/object properties to JSON strings — parse notes back.
    let notes = p.notes;
    if (typeof notes === "string") { try { notes = JSON.parse(notes); } catch { notes = []; } }
    if (!Array.isArray(notes)) notes = [];
    let h = `<div class="pop"><h3>${esc(p.name)}</h3>`;
    h += `<p class="meta">${esc(p.type)}${p.country ? " · " + esc(p.country) : ""}</p><dl>`;
    if (p.admin) h += `<dt>Within</dt><dd>${esc(p.admin)}</dd>`;
    if (p.variants) h += `<dt>Also</dt><dd>${esc(p.variants)}</dd>`;
    if (p.population) h += `<dt>Population</dt><dd>${esc(p.population)}</dd>`;
    if (notes.length) h += `<dt>Notes</dt><dd><ul>${notes.map(n=>`<li>${esc(n)}</li>`).join("")}</ul></dd>`;
    h += `</dl><p class="src">Source: Vol.&nbsp;${p.vol ?? "?"}, p.&nbsp;${p.page ?? "—"}` +
         (p.headword && p.headword !== p.name ? ` (under <em>${esc(p.headword)}</em>)` : "") +
         `<br>WHG match: ${whgLink(p.whg_id)}${p.whg_score!=null?` · score ${p.whg_score}`:""}</p>`;
    h += `<div class="pop-actions">`;
    if (p.vol) h += `<button class="read-btn" data-vol="${esc(String(p.vol))}" data-page="${esc(String(p.page ?? ""))}"`
                  + ` data-hw="${esc(p.headword || p.name || "")}"${p.eid != null ? ` data-eid="${p.eid}"` : ""}`
                  + `${p.rc != null ? ` data-rc="${p.rc}"` : ""}>📖 Read full entry</button>`;
    if (p.src) h += `<a class="src-link" href="${esc(p.src)}" target="_blank" rel="noopener">View source page ↗</a>`;
    h += `</div></div>`;
    return h;
  }

  // ── Data source: PMTiles vector tiles ─────────────────────────────────────────
  // Tiles are LIGHT (id/name/fclass only) so the map paints fast and scales to the whole corpus; the
  // full popup record is fetched lazily from a sharded detail store on click. Built by
  // process/build_tiles.sh, served statically (GitHub Pages handles the byte-range requests PMTiles needs).
  const SRC = { url: "./places.pmtiles", layer: "places", detail: "./detail" };

  // Circles fade IN as the heatmap fades OUT (cross-fade across z5–7).
  const PAINT = {
    "circle-radius": ["interpolate",["linear"],["zoom"], 4,3, 10,7],
    "circle-color": ["match",["get","fclass"],
      "P",COLORS.P,"A",COLORS.A,"H",COLORS.H,"T",COLORS.T,"S",COLORS.S,"X",COLORS.X, "#777"],
    "circle-stroke-width": 1, "circle-stroke-color": "#fff",
    "circle-opacity": ["interpolate",["linear"],["zoom"], 5,0, 7,.9],
    "circle-stroke-opacity": ["interpolate",["linear"],["zoom"], 5,0, 7,.9]
  };
  // Density heatmap for low zooms, weighted by the cluster point_count baked in by tippecanoe
  // (coalesce -> 1 for unclustered points). Fades out by ~z7.5 as the circles take over.
  const HEAT = {
    "heatmap-weight": ["interpolate",["linear"],["coalesce",["get","point_count"],1], 1,.15, 80,1],
    "heatmap-intensity": ["interpolate",["linear"],["zoom"], 0,.7, 7,1.6],
    "heatmap-radius": ["interpolate",["linear"],["zoom"], 0,7, 7,26],
    "heatmap-opacity": ["interpolate",["linear"],["zoom"], 5,.85, 7.5,0],
    "heatmap-color": ["interpolate",["linear"],["heatmap-density"],
      0,"rgba(0,0,0,0)", .2,"#9ec9e2", .45,"#4a90c2", .65,"#c9a14a", .82,"#c2683f", 1,"#a3322a"]
  };

  // Popup detail is fetched lazily by place id from sharded JSON; shards (and whole-shard fetches) are
  // cached, so clicking neighbouring places reuses one request. The manifest gives the shard count.
  let _shards = null, _manifest = null;
  const _shardCache = new Map();
  async function shardCount() {
    if (_manifest == null) _manifest = fetch(`${SRC.detail}/manifest.json`).then(r => r.json());
    return (_shards ??= (await _manifest).shards);
  }
  async function getDetail(id) {
    const n = await shardCount();
    const b = ((id % n) + n) % n;
    if (!_shardCache.has(b)) _shardCache.set(b, fetch(`${SRC.detail}/${b}.json`).then(r => r.json()));
    return { ...(await _shardCache.get(b))[id], id };
  }

  function addLayers() {
    map.addLayer({ id: "heat", type: "heatmap", source: "places", "source-layer": SRC.layer, maxzoom: 8, paint: HEAT });
    // Circles only for INDIVIDUAL places (cluster leaders carry point_count and feed only the heatmap),
    // so a click always resolves to one real place; dense areas stay heatmap until you zoom in enough.
    map.addLayer({ id: "pts", type: "circle", source: "places", "source-layer": SRC.layer,
      minzoom: 5, filter: ["!", ["has", "point_count"]], paint: PAINT });
    map.on("click", "pts", async e => {
      const p = e.features[0].properties;
      const at = e.features[0].geometry?.coordinates?.slice ? e.features[0].geometry.coordinates : e.lngLat;
      const popup = new maplibregl.Popup({ maxWidth: "320px" }).setLngLat(at).addTo(map);
      popup.setHTML(`<div class="pop"><h3>${esc(p.name || "")}</h3><p class="meta">loading…</p></div>`);
      try { popup.setHTML(popupHTML(await getDetail(p.id))); }
      catch { popup.setHTML(`<div class="pop"><h3>${esc(p.name || "")}</h3><p class="meta">detail unavailable</p></div>`); }
    });
    // Hover -> name tooltip, straight from the light tile (no fetch); click -> fetch full detail.
    const tip = new maplibregl.Popup({ closeButton: false, closeOnClick: false, offset: 8, className: "tip" });
    map.on("mousemove", "pts", e => {
      map.getCanvas().style.cursor = "pointer";
      const f = e.features[0];
      const at = f.geometry?.coordinates?.slice ? f.geometry.coordinates : e.lngLat;
      tip.setLngLat(at).setHTML(`<span class="tip-name">${esc(f.properties.name || "")}</span>`).addTo(map);
    });
    map.on("mouseleave", "pts", () => { map.getCanvas().style.cursor = ""; tip.remove(); });
  }

  function fillLegend(count) {  // tiles can't be enumerated client-side -> show all classes
    const leg = document.getElementById("legend");
    ["P","A","H","T","S","X"].forEach(k => {
      leg.insertAdjacentHTML("beforeend",
        `<div><span class="dot" style="background:${COLORS[k]}"></span>${LABELS[k]}</div>`);
    });
    if (count != null) leg.insertAdjacentHTML("beforeend",
      `<div style="margin-top:.35rem;color:#857d6c">${count.toLocaleString()} places</div>`);
  }

  // ── Full-entry reader modal — one continuous lazy-loaded reader across ALL volumes ──────────────
  const alpha = s => (s || "").toUpperCase().replace(/[^A-Z]/g, "");
  const rcache = new Map();
  const rGet = (vtag, name) => {          // manifest or a numbered chunk; cached
    const k = `${vtag}/${name}`;
    if (!rcache.has(k)) rcache.set(k, fetch(`./reader/${vtag}/${name}.json`).then(r => r.json()));
    return rcache.get(k);
  };
  let INDEX = null;                       // [{vol,title,chunks,count}] in reading order (v1…v7)
  const readerIndex = async () => INDEX || (INDEX = await fetch("./reader/index.json").then(r => r.json()));
  // global chunk address = [volumeIndex, chunkIndex]; next/prev step across volume boundaries
  const nextAddr = (vi, ci) => ci + 1 < INDEX[vi].chunks ? [vi, ci + 1] : (vi + 1 < INDEX.length ? [vi + 1, 0] : null);
  const prevAddr = (vi, ci) => ci > 0 ? [vi, ci - 1] : (vi > 0 ? [vi - 1, INDEX[vi - 1].chunks - 1] : null);
  const RD = { loVi: 0, loCi: 0, hiVi: 0, hiCi: -1, loading: false };
  const $scroll = () => document.getElementById("reader-scroll");
  const $content = () => document.getElementById("reader-content");

  async function addrHTML(vi, ci, target) {   // one chunk's HTML, prefixed with a volume divider at chunk 0
    const data = await rGet(INDEX[vi].vol, ci);
    const div = ci === 0 ? `<div class="rvol">${esc(INDEX[vi].title)}</div>` : "";
    return div + data.map(en => entryHTML(en, target && (target.eid != null ? en.eid === target.eid
      : (String(en.p) === String(target.page) && alpha(en.hw) === alpha(target.hw))))).join("");
  }

  function renderTable(t) {               // structured columns/rows -> HTML (multi-level header via group)
    const cols = t.columns || [], groups = cols.map(c => (c && c.group) || "");
    let h = `<table class="rtable">`;
    if (t.title) h += `<caption>${esc(t.title)}</caption>`;
    h += `<thead>`;
    if (groups.some(g => g)) {
      h += `<tr>`;
      for (let i = 0; i < cols.length;) { const g = groups[i]; let s = 1;
        while (i + s < cols.length && groups[i + s] === g) s++;
        h += `<th colspan="${s}"${g ? "" : ' class="blank"'}>${esc(g)}</th>`; i += s; }
      h += `</tr>`;
    }
    h += `<tr>` + cols.map(c => `<th>${esc((c && c.label) || "")}${c && c.unit ? ` <span class="unit">(${esc(c.unit)})</span>` : ""}</th>`).join("") + `</tr></thead>`;
    h += `<tbody>` + (t.rows || []).map(r => `<tr>` + (r || []).map(x => `<td>${esc(x)}</td>`).join("") + `</tr>`).join("") + `</tbody></table>`;
    if (t.source_note) h += `<div class="rnote">${esc(t.source_note)}</div>`;
    (t.footnotes || []).forEach(f => h += `<div class="rnote">${esc(f)}</div>`);
    return h;
  }
  function entryHTML(en, hi) {
    let h = `<article class="rentry${hi ? " hi" : ""}" data-eid="${en.eid}">`;
    h += `<h4 class="rhw">${esc(en.hw)}${en.p ? ` <span class="rp">p.${en.p}</span>` : ""}</h4>`;
    h += `<div class="rtext${en.k === "c" ? " rxref" : ""}">${esc(en.text)}</div>`;
    (en.tables || []).forEach(t => h += renderTable(t));
    return h + `</article>`;
  }

  let ioTop, ioBot;
  async function loadMore(dir) {          // dir +1 = append next chunk, -1 = prepend previous (across volumes)
    if (RD.loading) return;
    const a = dir > 0 ? nextAddr(RD.hiVi, RD.hiCi) : prevAddr(RD.loVi, RD.loCi);
    if (!a) return;
    RD.loading = true;
    const html = await addrHTML(a[0], a[1]);
    const sc = $scroll(), ct = $content();
    if (dir > 0) { ct.insertAdjacentHTML("beforeend", html); RD.hiVi = a[0]; RD.hiCi = a[1]; }
    else { const h0 = sc.scrollHeight; ct.insertAdjacentHTML("afterbegin", html); RD.loVi = a[0]; RD.loCi = a[1]; sc.scrollTop += sc.scrollHeight - h0; }
    RD.loading = false;
  }
  async function openReader(vol, page, hw, eid, rc) {
    await readerIndex();
    const vtag = "v" + String(vol).replace(/^v/i, "");   // detail carries "5"; reader dir is "v5"
    const vi = Math.max(0, INDEX.findIndex(v => v.vol === vtag));
    let ci = rc;                          // prefer the exact reader-chunk baked into the place
    if (ci == null) { const m = await rGet(vtag, "manifest");
      ci = (m.page_index && m.page_index[String(page)] != null) ? m.page_index[String(page)] : 0; }
    document.getElementById("reader-title").textContent = INDEX[vi].title;
    $content().innerHTML = await addrHTML(vi, ci, { eid, page, hw });
    RD.loVi = RD.hiVi = vi; RD.loCi = RD.hiCi = ci;
    showModal();
    ($content().querySelector(".rentry.hi") || $content().firstElementChild || {}).scrollIntoView?.({ block: "center" });
  }
  function showModal() {
    document.getElementById("modal").hidden = false; document.body.style.overflow = "hidden";
    ioTop = ioTop || new IntersectionObserver(es => es[0].isIntersecting && loadMore(-1), { root: $scroll() });
    ioBot = ioBot || new IntersectionObserver(es => es[0].isIntersecting && loadMore(1), { root: $scroll() });
    ioTop.observe(document.getElementById("sentinel-top"));
    ioBot.observe(document.getElementById("sentinel-bottom"));
  }
  function hideModal() {
    document.getElementById("modal").hidden = true; document.body.style.overflow = "";
    ioTop && ioTop.disconnect(); ioBot && ioBot.disconnect();
  }
  document.addEventListener("click", e => {
    const b = e.target.closest(".read-btn");
    if (b) return openReader(b.dataset.vol, b.dataset.page, b.dataset.hw,
                             b.dataset.eid != null ? +b.dataset.eid : null,
                             b.dataset.rc != null ? +b.dataset.rc : null);
    if (e.target.id === "modal" || e.target.id === "reader-close") hideModal();
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape") hideModal(); });

  map.on("load", async () => {
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);
    const pm = new pmtiles.PMTiles(SRC.url);
    protocol.add(pm);
    map.addSource("places", { type: "vector", url: "pmtiles://" + SRC.url });
    addLayers();
    const h = await pm.getHeader();          // tile bounds -> fit
    map.fitBounds([[h.minLon, h.minLat], [h.maxLon, h.maxLat]], { padding: 60, maxZoom: 6 });
    let count = null;
    try { count = (await pm.getMetadata())?.tilestats?.layers?.[0]?.count ?? null; } catch {}
    fillLegend(count);
  });
  </script>
</body>
</html>
